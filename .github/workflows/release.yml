name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run when NPM_TOKEN is present so forks / unset-secret runs don't fail
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed so changesets can diff tags
          fetch-depth: 0

      - uses: pnpm/action-setup@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build --filter=!docs --filter=!playground

      - name: Create Release PR or Publish
        # Skip the publish step entirely when the token is absent
        if: ${{ env.NPM_TOKEN != '' }}
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish (no NPM_TOKEN)
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "NPM_TOKEN secret not set — skipping publish. Add it in Settings → Secrets → Actions."
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
